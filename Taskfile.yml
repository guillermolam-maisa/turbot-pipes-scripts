version: "3"

vars:
  MAX_PARALLEL: '{{default "1" .MAX_PARALLEL}}'
  QUERY_TIMEOUT: '{{default "90" .QUERY_TIMEOUT}}'
  BENCHMARK_TIMEOUT: '{{default "2700" .BENCHMARK_TIMEOUT}}'

tasks:
  default:
    cmds:
      - task --list

  validate:
    desc: Validate scripts and local compose/task wiring.
    cmds:
      - bash ./scripts/check-dependencies.sh --profile common
      - bash ./scripts/validate-workspace.sh

  vendor:binaries:
    desc: Copy the local Steampipe and Powerpipe binaries into ./vendor/bin for container builds.
    cmds:
      - bash ./scripts/check-dependencies.sh --profile host
      - bash ./scripts/vendor-local-binaries.sh

  benchmark:smoke:
    desc: Run the narrow admin_only smoke benchmark with the safe wrapper.
    env:
      SEARCH_PATH: admin_only
      BENCHMARK: aws_compliance.benchmark.all_controls_account
      MAX_PARALLEL: "{{.MAX_PARALLEL}}"
      QUERY_TIMEOUT: "{{.QUERY_TIMEOUT}}"
      BENCHMARK_TIMEOUT: "{{.BENCHMARK_TIMEOUT}}"
    cmds:
      - bash ./scripts/check-dependencies.sh --profile host
      - bash ./powerpipe/run-all-controls-safe.sh

  benchmark:admin:
    desc: Run the full admin_only benchmark with the safe wrapper.
    env:
      SEARCH_PATH: admin_only
      MAX_PARALLEL: "{{.MAX_PARALLEL}}"
      QUERY_TIMEOUT: "{{.QUERY_TIMEOUT}}"
      BENCHMARK_TIMEOUT: "{{.BENCHMARK_TIMEOUT}}"
    cmds:
      - bash ./scripts/check-dependencies.sh --profile host
      - bash ./powerpipe/run-all-controls-safe.sh

  benchmark:all:
    desc: Run the full all-connections benchmark with the safe wrapper.
    env:
      SEARCH_PATH: all
      MAX_PARALLEL: "{{.MAX_PARALLEL}}"
      QUERY_TIMEOUT: "{{.QUERY_TIMEOUT}}"
      BENCHMARK_TIMEOUT: "{{.BENCHMARK_TIMEOUT}}"
    cmds:
      - bash ./scripts/check-dependencies.sh --profile host
      - bash ./powerpipe/run-all-controls-safe.sh

  compose:config:
    desc: Validate the Docker Compose configuration when Docker is installed.
    deps:
      - vendor:binaries
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: docker is required for compose targets.
    cmds:
      - bash ./scripts/cleanup-runtime.sh
      - bash ./scripts/check-dependencies.sh --profile compose
      - bash ./scripts/write-compose-env.sh >/dev/null
      - bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env config >/dev/null

  compose:run:smoke:
    desc: Run the narrow smoke benchmark with Compose-managed services.
    deps:
      - vendor:binaries
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: docker is required for compose targets.
    cmds:
      - bash ./scripts/cleanup-runtime.sh
      - bash ./scripts/check-dependencies.sh --profile compose
      - bash ./scripts/write-compose-env.sh >/dev/null
      - bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env up -d steampipe powerpipe
      - bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env --profile runner run --rm -e SEARCH_PATH=admin_only -e BENCHMARK=aws_compliance.benchmark.all_controls_account -e BENCHMARK_ACCEPT_FINDINGS=true runner

  compose:run:admin:
    desc: Run the full admin_only benchmark with Compose-managed services.
    deps:
      - vendor:binaries
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: docker is required for compose targets.
    cmds:
      - bash ./scripts/cleanup-runtime.sh
      - bash ./scripts/check-dependencies.sh --profile compose
      - bash ./scripts/write-compose-env.sh >/dev/null
      - bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env up -d steampipe powerpipe
      - bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env --profile runner run --rm -e SEARCH_PATH=admin_only runner

  compose:run:all:
    desc: Run the full all-connections benchmark with Compose-managed services.
    deps:
      - vendor:binaries
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: docker is required for compose targets.
    cmds:
      - bash ./scripts/cleanup-runtime.sh
      - bash ./scripts/check-dependencies.sh --profile compose
      - bash ./scripts/write-compose-env.sh >/dev/null
      - bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env up -d steampipe powerpipe
      - bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env --profile runner run --rm -e SEARCH_PATH=aws_all runner

  compose:up:
    desc: Start the Compose-managed Steampipe and Powerpipe services.
    deps:
      - vendor:binaries
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: docker is required for compose targets.
    cmds:
      - bash ./scripts/cleanup-runtime.sh
      - bash ./scripts/check-dependencies.sh --profile compose
      - bash ./scripts/write-compose-env.sh >/dev/null
      - bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env up -d steampipe powerpipe

  compose:down:
    desc: Stop the Compose-managed services.
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: docker is required for compose targets.
    cmds:
      - bash ./scripts/cleanup-runtime.sh
      - bash ./scripts/check-dependencies.sh --profile compose
      - sh -c 'if [ -f /tmp/turbot-runtime/compose.env ]; then bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env down; else bash ./scripts/docker-compose.sh down; fi'

  compose:logs:
    desc: Tail the Compose-managed service logs.
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: docker is required for compose targets.
    cmds:
      - bash ./scripts/check-dependencies.sh --profile compose
      - sh -c 'if [ -f /tmp/turbot-runtime/compose.env ]; then bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env logs -f steampipe powerpipe; else bash ./scripts/docker-compose.sh logs -f steampipe powerpipe; fi'

  compose:tailpipe:
    desc: Start the optional Tailpipe CloudTrail collection toolbox profile.
    deps:
      - vendor:binaries
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: docker is required for compose targets.
    cmds:
      - bash ./scripts/cleanup-runtime.sh
      - bash ./scripts/check-dependencies.sh --profile compose
      - bash ./scripts/write-compose-env.sh >/dev/null
      - bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env --profile tailpipe up -d tailpipe

  compose:tailpipe:smoke:
    desc: Run Tailpipe collect/query against CloudTrail using AWS profiles from ~/.aws/config.
    deps:
      - vendor:binaries
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: docker is required for compose targets.
    cmds:
      - bash ./scripts/cleanup-runtime.sh
      - bash ./scripts/check-dependencies.sh --profile compose
      - bash ./scripts/check-dependencies.sh --profile tailpipe
      - env PROFILE_SELECTOR=admin_only DISCOVERY_ROOT=powerpipe/results/discovery bash ./scripts/discover-tailpipe-sources.sh
      - bash ./scripts/write-compose-env.sh >/dev/null
      - bash ./scripts/docker-compose.sh --env-file /tmp/turbot-runtime/compose.env --profile tailpipe run --rm -e TAILPIPE_MODE=smoke tailpipe

  tailpipe:discover:admin:
    desc: Discover CloudTrail and S3 access-log sources across admin AWS profiles.
    cmds:
      - bash ./scripts/check-dependencies.sh --profile tailpipe
      - env PROFILE_SELECTOR=admin_only DISCOVERY_ROOT=powerpipe/results/discovery bash ./scripts/discover-tailpipe-sources.sh

  tailpipe:discover:all:
    desc: Discover CloudTrail and S3 access-log sources across all configured AWS profiles.
    cmds:
      - bash ./scripts/check-dependencies.sh --profile tailpipe
      - env PROFILE_SELECTOR=all DISCOVERY_ROOT=powerpipe/results/discovery bash ./scripts/discover-tailpipe-sources.sh
