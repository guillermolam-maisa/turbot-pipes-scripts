version: "3"

vars:
  MAX_PARALLEL: '{{default "0" .MAX_PARALLEL}}'
  QUERY_TIMEOUT: '{{default "90" .QUERY_TIMEOUT}}'
  BENCHMARK_TIMEOUT: '{{default "0" .BENCHMARK_TIMEOUT}}'

includes:
  benchmark: tasks/benchmark.yml
  compose: tasks/compose.yml
  tailpipe: tasks/tailpipe.yml

tasks:
  default:
    desc: Run the full deterministic pipeline (validate -> config -> up -> smoke).
    cmds:
      - task: all

  bootstrap:
    desc: Install pinned Turbot host binaries/plugins/mods into the local workspace and validate wiring.
    cmds:
      - bash ./scripts/bootstrap-workspace.sh

  doctor:
    desc: Check whether this machine is ready for host-side and compose-based runs.
    cmds:
      - bash ./scripts/doctor.sh

  setup:workspace:
    desc: Install pinned Turbot host binaries/plugins/mods without running the full doctor flow.
    cmds:
      - bash ./scripts/bootstrap-workspace.sh

  all:
    desc: Execute all core tasks in order to provision and verify the environment.
    cmds:
      - task: validate
      - task: compose:config
      - task: compose:run:smoke

  validate:
    desc: Validate scripts and local compose/task wiring.
    cmds:
      - bash ./scripts/check-dependencies.sh --profile common
      - bash ./scripts/validate-workspace.sh

  checksums:generate:
    desc: Regenerate the pinned SHA256 checksums for all tool binaries.
    cmds:
      - bash ./scripts/generate-pinned-checksums.sh

  vendor:binaries:
    desc: Copy the local Steampipe and Powerpipe binaries into ./vendor/bin for host-side benchmarks.
    cmds:
      - bash ./scripts/check-dependencies.sh --profile host
      - bash ./scripts/vendor-local-binaries.sh
